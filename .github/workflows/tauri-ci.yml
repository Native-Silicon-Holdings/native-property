name: Tauri Desktop CI/CD

on:
  push:
    branches: [claude/dev-installable-*]
  pull_request:
    branches: [claude/dev-installable-*]

jobs:
  # Rust Tests for Tauri Backend
  tauri-rust-tests:
    name: Tauri Rust Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run Rust tests
        working-directory: frontend/src-tauri
        run: cargo test --verbose

      - name: Run Rust clippy
        working-directory: frontend/src-tauri
        run: cargo clippy -- -D warnings

      - name: Check Rust formatting
        working-directory: frontend/src-tauri
        run: cargo fmt -- --check

  # Frontend Tauri Service Tests
  tauri-frontend-tests:
    name: Tauri Frontend Service Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run Tauri service tests
        working-directory: frontend
        run: npm test -- src/__tests__/services/tauri.service.test.ts

      - name: Run all frontend tests
        working-directory: frontend
        run: npm test

  # Tauri Build Test for Linux
  tauri-build-linux:
    name: Tauri Build (Linux)
    runs-on: ubuntu-latest
    needs: [tauri-rust-tests, tauri-frontend-tests]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Tauri app (debug)
        working-directory: frontend
        run: npm run tauri:build:debug
        env:
          VITE_API_URL: http://localhost:5000/api

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-linux-debug
          path: |
            frontend/src-tauri/target/debug/bundle/
          retention-days: 7

  # Tauri Build Test for Windows
  tauri-build-windows:
    name: Tauri Build (Windows)
    runs-on: windows-latest
    needs: [tauri-rust-tests, tauri-frontend-tests]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Tauri app (debug)
        working-directory: frontend
        run: npm run tauri:build:debug
        env:
          VITE_API_URL: http://localhost:5000/api

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-windows-debug
          path: |
            frontend/src-tauri/target/debug/bundle/
          retention-days: 7

  # Tauri Build Test for macOS
  tauri-build-macos:
    name: Tauri Build (macOS)
    runs-on: macos-latest
    needs: [tauri-rust-tests, tauri-frontend-tests]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Tauri app (debug)
        working-directory: frontend
        run: npm run tauri:build:debug
        env:
          VITE_API_URL: http://localhost:5000/api

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-macos-debug
          path: |
            frontend/src-tauri/target/debug/bundle/
          retention-days: 7

  # Backend Tests (still needed for API)
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: estate_management_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma Client
        working-directory: backend
        run: npx prisma generate

      - name: Run database migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/estate_management_test?schema=public
        run: npx prisma migrate deploy

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/estate_management_test?schema=public
          JWT_SECRET: test-secret-key
          NODE_ENV: test
        run: npm test

      - name: Build
        working-directory: backend
        run: npm run build

  # Security Audit
  security-audit:
    name: Security Audit (Tauri)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Audit frontend dependencies
        working-directory: frontend
        run: npm audit --audit-level=moderate || true

      - name: Audit Rust dependencies
        working-directory: frontend/src-tauri
        run: cargo audit || echo "cargo-audit not installed, skipping"

      - name: Audit backend dependencies
        working-directory: backend
        run: npm audit --audit-level=moderate || true
