# =============================================================================
# docker-compose.yml — native-property frontend only (Supabase-native)
# =============================================================================
# The backend (Express/Prisma) and standalone Postgres are RETIRED.
# All data now lives on the shared self-hosted Supabase instance.
# This file is for local development only.
# =============================================================================

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
    container_name: native-property-frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env
    ports:
      - "${FRONTEND_PORT:-4000}:80"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  default:
    name: native-silicon-network
