# =============================================================================
# External Secrets — sync Supabase keys from Vault
# =============================================================================
# Vault path: secret/apps/native-property/app
# Same values as other apps since it's on the shared Supabase instance.
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: native-property-secrets
  namespace: native-property
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: native-property-secrets
    creationPolicy: Owner
  data:
    - secretKey: VITE_SUPABASE_URL
      remoteRef:
        key: secret/apps/native-property/app
        property: VITE_SUPABASE_URL
    - secretKey: VITE_SUPABASE_ANON_KEY
      remoteRef:
        key: secret/apps/native-property/app
        property: VITE_SUPABASE_ANON_KEY
