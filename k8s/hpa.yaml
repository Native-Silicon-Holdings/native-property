# =============================================================================
# HPA — native-property frontend (auto-scale based on CPU)
# =============================================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: native-property
  namespace: native-property
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: native-property
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
