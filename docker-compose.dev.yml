# Development override for docker-compose (Supabase-native)
# Usage: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# Backend and Postgres are RETIRED. Frontend connects directly to shared Supabase.
# Ensure VITE_SUPABASE_URL and VITE_SUPABASE_ANON_KEY are set in ./frontend/.env

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "${FRONTEND_PORT:-3001}:3000"
    command: npm run dev
